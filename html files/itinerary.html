<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your AI-generated day-by-day travel itinerary, interactive map, weather forecast, and chat with Ritu your AI travel companion.">
    <title>Journey AI - Interactive Map</title>
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        /* Leaflet popup styling override to match MapCN / shadcn/ui */
        .leaflet-custom-popup-modern .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] .leaflet-custom-popup-modern .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaflet-custom-popup-modern .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.95);
        }
        [data-theme="dark"] .leaflet-custom-popup-modern .leaflet-popup-tip {
            background: rgba(15, 23, 42, 0.95);
        }
        .leaflet-custom-popup-modern .leaflet-popup-content {
            margin: 0;
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        [data-theme="dark"] body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .iphone-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] .iphone-glass {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* High-Tech Glow border for map container in dark mode */
        [data-theme="dark"] #mapPanel {
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.12), inset 0 0 20px rgba(56, 189, 248, 0.05);
            border-color: rgba(56, 189, 248, 0.25) !important;
        }

        /* Futuristic Adaptable Midnight Map Filter */
        /* Native dark tiles loaded via CartoDB are utilized, avoiding double-inversion filters */

        /* Abstract dynamic waves bg */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Spotlight tracking mouse */
        #spotlight {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle 800px at var(--x, 50%) var(--y, 50%), rgba(56, 189, 248, 0.07), transparent 40%);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 20px;
        }

        [data-theme="dark"] .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.1);
        }
        
        /* Map custom overrides */
        .leaflet-control-zoom a {
            background-color: rgba(15, 23, 42, 0.8) !important;
            color: white !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(10px);
        }
        [data-theme="light"] .leaflet-control-zoom a {
            background-color: white !important;
            color: black !important;
            border: 1px solid rgba(0,0,0,0.1) !important;
        }

        /* Smooth Chat Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .chat-bubble-animate {
            animation: slideInUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .blue-tick {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .blue-tick:hover {
            transform: scale(1.03) translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glowing neon line animations for Leaflet maps */
        .neon-glow {
            filter: drop-shadow(0 0 5px #38bdf8) drop-shadow(0 0 2px #38bdf8);
            stroke-dasharray: 10, 15;
            animation: mapDash 45s linear infinite;
        }
        @keyframes mapDash {
            to {
                stroke-dashoffset: -1000;
            }
        }
        /* Leaflet custom tooltip */
        .leaflet-custom-tooltip {
            background: rgba(15, 23, 42, 0.92) !important;
            border: 1px solid rgba(56, 189, 248, 0.3) !important;
            border-radius: 10px !important;
            color: #e2e8f0 !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            padding: 6px 10px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3) !important;
            white-space: nowrap !important;
        }
        .leaflet-custom-tooltip b { color: #38bdf8; }
        .leaflet-custom-tooltip::before {
            border-top-color: rgba(56, 189, 248, 0.3) !important;
        }
    </style>
</head>

<body onmousemove="updateSpotlight(event)" class="flex flex-col">
    <canvas id="bg-canvas"></canvas>
    <div id="spotlight"></div>
    <nav></nav>
    <main class="flex flex-col md:flex-row flex-1 overflow-hidden pt-20 md:pt-24 px-3 md:px-6 pb-3 md:pb-6 gap-3 md:gap-6 relative z-10 max-w-[1800px] mx-auto w-full">
        <!-- Mobile Tab Switcher -->
        <div id="mobileTabSwitcher" class="md:hidden flex justify-between p-1 bg-white/10 dark:bg-slate-800/40 border border-slate-200/50 dark:border-white/10 rounded-2xl mx-1 mb-2 relative z-20 shrink-0">
            <button onclick="switchMobileTab('chat')" id="tabBtnChat" class="flex-1 py-3 text-[11px] font-bold uppercase tracking-wider rounded-xl transition duration-300 bg-sky-500 text-white shadow-md shadow-sky-500/20">
                <i class="fa-solid fa-comments text-xs mr-1"></i> Chat Scout
            </button>
            <button onclick="switchMobileTab('map')" id="tabBtnMap" class="flex-1 py-3 text-[11px] font-bold uppercase tracking-wider rounded-xl transition duration-300 text-slate-500 dark:text-slate-400">
                <i class="fa-solid fa-map text-xs mr-1"></i> Interactive Map
            </button>
        </div>
        
        <!-- Left Panel: AI Chat Interface -->
        <section id="chatPanel" class="flex flex-col flex-1 md:flex-[1.2] iphone-glass rounded-[24px] md:rounded-[40px] overflow-hidden shadow-2xl border border-sky-400/20 md:border-2 md:flex">
            <!-- Header -->
            <div class="p-3 md:p-6 border-b border-white/10 flex items-center gap-3 md:gap-4 bg-white/5 backdrop-blur-md relative z-10">
                <div class="w-8 h-8 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-white shadow-lg shadow-sky-500/30 shrink-0">
                    <i class="fa-solid fa-wand-magic-sparkles text-sm md:text-xl"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h2 class="text-sm md:text-base font-bold tracking-tight text-slate-800 dark:text-white flex items-center gap-2 truncate">
                        Ritu <span class="px-2 py-0.5 rounded-md bg-sky-500/20 text-sky-500 text-[8px] uppercase font-bold tracking-widest hidden sm:inline">Co-Pilot</span>
                    </h2>
                    <div class="flex items-center gap-1.5 truncate mt-0.5">
                        <span id="aiStatus" class="font-bold text-[8px] md:text-[9px] uppercase tracking-widest text-emerald-400">Connecting...</span>
                        <span class="text-white/20">&bull;</span>
                        <span id="displayTitle" class="font-bold text-[8px] md:text-[9px] uppercase tracking-widest text-slate-400 dark:text-slate-300"></span>
                        <span class="text-white/20">&bull;</span>
                        <span id="displayStats" class="font-bold text-[8px] md:text-[9px] text-sky-500 truncate">--</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="shareToWhatsApp()"
                        class="bg-[#25D366] hover:bg-[#22c35e] text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5 hover:scale-[1.03] transition-all shadow-md shadow-emerald-500/10 active:scale-95">
                        <i class="fa-brands fa-whatsapp text-xs md:text-sm"></i> <span>Share</span>
                    </button>
                    <button onclick="saveTripAndRedirect()"
                        class="bg-sky-500 hover:bg-sky-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5 hover:scale-[1.03] transition-all shadow-md shadow-sky-500/10 active:scale-95">
                        <i class="fa-solid fa-bookmark text-xs md:text-sm"></i> <span>Save</span>
                    </button>
                    <button id="analyzerToggleBtn" onclick="toggleAnalyzerVisibility()"
                        class="bg-white/40 dark:bg-slate-800/40 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-white/10 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5 hover:scale-[1.03] transition-all hover:text-sky-500 hover:border-sky-500/50 shadow-sm">
                        <i class="fa-solid fa-route text-xs md:text-sm"></i> <span>Route</span>
                    </button>
                </div>
            </div>
            
            <!-- Weather Alert Banner -->
            <div id="weatherAlertBanner" class="px-4 py-2.5 bg-gradient-to-r from-sky-400/10 to-indigo-500/10 backdrop-blur-md border-b border-slate-200/50 dark:border-white/10 flex items-center justify-between gap-3 text-[11px] font-bold text-slate-700 dark:text-slate-200 transition-all duration-300 relative z-10 select-none cursor-pointer hover:from-sky-400/20 hover:to-indigo-500/20" onclick="askWeatherAdvice()">
                <div class="flex items-center gap-2">
                    <span id="weatherIcon" class="text-sm text-yellow-400 animate-pulse"><i class="fa-solid fa-cloud-sun-rain"></i></span>
                    <span id="weatherText" class="truncate max-w-[200px] sm:max-w-md">Analyzing local destination climate...</span>
                </div>
                <span class="text-[8px] font-bold bg-sky-500/20 text-sky-600 dark:text-sky-400 px-2 py-0.5 rounded-md flex items-center gap-1 shrink-0 uppercase tracking-wider">
                    Ask Ritu <i class="fa-solid fa-chevron-right text-[6px]"></i>
                </span>
            </div>

            <!-- Chat messages container -->
            <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-4 md:space-y-6 custom-scroll" id="chatContainer">
                <!-- Dynamic Bubbles Go Here -->
            </div>

            <!-- Input area -->
            <div class="p-3 md:p-6 bg-white/40 dark:bg-slate-900/30 border-t border-slate-200/50 dark:border-white/5 backdrop-blur-md relative z-10">
                <!-- Quick Suggestion Chips -->
                <div class="flex gap-2 overflow-x-auto pb-3 mb-2 no-scrollbar shrink-0 select-none scroll-smooth">
                    <button onclick="sendQuickAction('What food spots do you recommend?')" class="chip-action px-3.5 py-1.5 rounded-full text-[10px] md:text-[11px] font-bold uppercase tracking-wider bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 hover:border-sky-500 dark:hover:border-sky-500 hover:bg-sky-500/5 dark:hover:bg-sky-500/10 hover:text-sky-500 dark:hover:text-sky-400 transition-all duration-300 shrink-0 flex items-center gap-1.5 text-slate-700 dark:text-slate-200 shadow-sm">
                        <i class="fa-solid fa-bowl-rice text-xs text-orange-400"></i> Local Food
                    </button>
                    <button onclick="sendQuickAction('What should I pack for this trip?')" class="chip-action px-3.5 py-1.5 rounded-full text-[10px] md:text-[11px] font-bold uppercase tracking-wider bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 hover:border-sky-500 dark:hover:border-sky-500 hover:bg-sky-500/5 dark:hover:bg-sky-500/10 hover:text-sky-500 dark:hover:text-sky-400 transition-all duration-300 shrink-0 flex items-center gap-1.5 text-slate-700 dark:text-slate-200 shadow-sm">
                        <i class="fa-solid fa-suitcase text-xs text-emerald-400"></i> Packing Tips
                    </button>
                    <button onclick="sendQuickAction('How is the local transport and getting around?')" class="chip-action px-3.5 py-1.5 rounded-full text-[10px] md:text-[11px] font-bold uppercase tracking-wider bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 hover:border-sky-500 dark:hover:border-sky-500 hover:bg-sky-500/5 dark:hover:bg-sky-500/10 hover:text-sky-500 dark:hover:text-sky-400 transition-all duration-300 shrink-0 flex items-center gap-1.5 text-slate-700 dark:text-slate-200 shadow-sm">
                        <i class="fa-solid fa-taxi text-xs text-sky-400"></i> Getting Around
                    </button>
                    <button onclick="sendQuickAction('What budget details and ticket prices should I expect?')" class="chip-action px-3.5 py-1.5 rounded-full text-[10px] md:text-[11px] font-bold uppercase tracking-wider bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 hover:border-sky-500 dark:hover:border-sky-500 hover:bg-sky-500/5 dark:hover:bg-sky-500/10 hover:text-sky-500 dark:hover:text-sky-400 transition-all duration-300 shrink-0 flex items-center gap-1.5 text-slate-700 dark:text-slate-200 shadow-sm">
                        <i class="fa-solid fa-wallet text-xs text-yellow-400"></i> Budget Details
                    </button>
                    <button onclick="sendQuickAction('Show me safety tips and local culture etiquette')" class="chip-action px-3.5 py-1.5 rounded-full text-[10px] md:text-[11px] font-bold uppercase tracking-wider bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-white/10 hover:border-sky-500 dark:hover:border-sky-500 hover:bg-sky-500/5 dark:hover:bg-sky-500/10 hover:text-sky-500 dark:hover:text-sky-400 transition-all duration-300 shrink-0 flex items-center gap-1.5 text-slate-700 dark:text-slate-200 shadow-sm">
                        <i class="fa-solid fa-shield-halved text-xs text-indigo-400"></i> Safety & Tips
                    </button>
                </div>
                <div class="relative flex items-center gap-2 md:gap-3">
                    <input id="chatInput" type="text" placeholder="Ask questions, or edit: 'Add Chapora Fort to Day 2'..."
                        class="flex-1 bg-white/80 dark:bg-slate-800/40 border border-slate-200/60 dark:border-white/10 rounded-xl md:rounded-2xl py-3 px-4 md:py-3.5 md:px-5 text-xs md:text-sm font-semibold text-slate-800 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 transition-all shadow-sm animate-pulse-once"
                        onkeydown="if(event.key==='Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()"
                        class="w-10 h-10 md:w-12 md:h-12 bg-sky-500 hover:bg-sky-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20 hover:scale-[1.03] transition-all duration-200 shrink-0 active:scale-95">
                        <i class="fa-solid fa-paper-plane text-xs md:text-sm"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Right Panel: Interactive Leaflet Map -->
        <section id="mapPanel" class="hidden md:flex flex-col flex-1 md:flex-[1.5] iphone-glass rounded-[24px] md:rounded-[40px] overflow-hidden border border-white/10 md:border-2 relative shadow-2xl">
            <div id="map" class="w-full h-full rounded-[22px] md:rounded-[38px] z-0"></div>
            
            <!-- Map Day-Route Legend & Info Sidebar (stacked cleanly to avoid overlap) -->
            <div id="mapSidebarContainer" class="absolute top-4 left-4 w-[280px] z-[400] flex flex-col gap-3.5 pointer-events-none transition-all duration-300">

                <!-- MapCN Route Summary Card -->
                <div id="routeSummaryCard" class="pointer-events-auto iphone-glass p-3.5 rounded-[20px] shadow-2xl border border-slate-200/50 dark:border-white/15 w-full transition-all duration-300 select-none hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-sky-500/10 dark:bg-sky-500/20 rounded-lg flex items-center justify-center text-sky-500">
                                <i class="fa-solid fa-route"></i>
                            </div>
                            <div>
                                <p class="text-[8px] font-black uppercase tracking-widest text-slate-400">Total Distance</p>
                                <h4 id="routeSummaryDistance" class="text-[11px] font-bold text-slate-800 dark:text-slate-100">0.0 km</h4>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-indigo-500/10 dark:bg-indigo-500/20 rounded-lg flex items-center justify-center text-indigo-400">
                                <i class="fa-solid fa-clock"></i>
                            </div>
                            <div>
                                <p class="text-[8px] font-black uppercase tracking-widest text-slate-400">Travel Time</p>
                                <h4 id="routeSummaryDuration" class="text-[11px] font-bold text-slate-800 dark:text-slate-100">0 mins</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Route & Transit Analyzer Panel -->
                <div id="routeAnalyzerPanel" class="pointer-events-auto iphone-glass p-4 rounded-[20px] shadow-2xl border border-slate-200/50 dark:border-white/15 w-full transition-all duration-300 select-none hidden">
                    <div class="flex items-center justify-between mb-2.5 border-b border-slate-200 dark:border-white/10 pb-1.5">
                        <h4 class="font-black text-[10px] uppercase tracking-wider text-sky-500 flex items-center gap-1.5"><i class="fa-solid fa-route"></i> Route Transit Analyzer</h4>
                        <button onclick="toggleRouteAnalyzer()" class="text-slate-400 hover:text-sky-500 transition"><i class="fa-solid fa-chevron-up text-[9px]" id="analyzerChevron"></i></button>
                    </div>
                    <div id="routeAnalyzerExpandable" class="space-y-2.5">
                        <div id="routeAnalyzerContent" class="space-y-2 max-h-48 overflow-y-auto custom-scroll pr-1 text-slate-800 dark:text-slate-200">
                            <!-- Dynamic Transit Steps Go Here -->
                        </div>
                        <div class="mt-2 pt-1.5 border-t border-slate-200/50 dark:border-white/5">
                            <p class="text-[8px] font-bold text-slate-400 flex items-center gap-1"><i class="fa-solid fa-info-circle text-sky-400"></i> Distances are straight-line (haversine) estimates</p>
                        </div>
                        <div class="mt-3.5 pt-2.5 border-t border-slate-200 dark:border-white/10">
                            <button onclick="triggerRouteOptimization()" class="w-full bg-sky-500 hover:bg-sky-600 text-white py-2 rounded-xl text-[9px] font-black uppercase tracking-wider flex items-center justify-center gap-1.5 transition shadow-lg shadow-sky-500/20 active:scale-95">
                                <i class="fa-solid fa-wand-magic-sparkles"></i> Optimize Route
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Map Day-Route Legend -->
                <div id="mapLegendPanel" class="pointer-events-auto iphone-glass px-3.5 py-2.5 rounded-[16px] shadow-xl border border-slate-200/40 dark:border-white/10 w-full transition-all duration-300">
                    <div class="flex items-center justify-between mb-1.5 border-b border-slate-200/50 dark:border-white/5 pb-1">
                        <p class="text-[8px] font-black uppercase tracking-widest text-slate-400">Route Legend</p>
                        <button id="showAllDaysBtn" onclick="highlightDayRoute(null)" class="text-[8px] font-black uppercase tracking-widest bg-sky-500/20 text-sky-500 hover:bg-sky-500 hover:text-white px-2 py-0.5 rounded transition duration-200" style="display: none;">Show All</button>
                    </div>
                    <div id="mapLegend" class="flex flex-row flex-wrap gap-2 text-slate-700 dark:text-slate-300"></div>
                </div>
            </div>
            
            <div id="placePopup" class="absolute bottom-4 left-4 right-4 md:bottom-10 md:left-1/2 md:-translate-x-1/2 md:right-auto md:w-[480px] md:max-w-[calc(100%-2rem)] iphone-glass p-0 rounded-[20px] md:rounded-[32px] shadow-2xl overflow-hidden transition-all duration-500 transform translate-y-[150%] opacity-0 z-50 pointer-events-none border border-slate-200/50 dark:border-white/10">
                <div class="w-full h-56 bg-slate-200 relative overflow-hidden group">
                    <img id="popupImg" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="" alt="Place photo">
                    <div id="imageFallbackText" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm opacity-0 transition-opacity duration-300 pointer-events-none">
                        <span class="text-white font-bold text-sm md:text-base text-center px-6 leading-tight uppercase tracking-wider"><i class="fa-solid fa-camera-viewfinder mb-2 block text-2xl opacity-50"></i> Images of this place<br>aren't available</span>
                    </div>
                    <button onclick="closePopup()" aria-label="Close popup" class="absolute top-4 right-4 w-10 h-10 bg-black/40 backdrop-blur-md rounded-full text-white flex items-center justify-center hover:bg-black/70 pointer-events-auto transition hover:rotate-90 shadow-xl">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                    <!-- Gradient overlay -->
                    <div class="absolute bottom-0 w-full h-2/3 bg-gradient-to-t from-slate-950/85 to-transparent"></div>
                    
                    <div class="absolute bottom-5 left-6 right-6 z-10 drop-shadow-md">
                        <h4 id="popupTitle" class="font-bold text-2xl md:text-3xl text-white mb-1 tracking-tight leading-tight line-clamp-2">Loading...</h4>
                    </div>
                </div>
                <div class="p-6 md:p-8 font-sans bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur-2xl border-t border-slate-200 dark:border-slate-800 pointer-events-auto relative">
                    <p id="popupDesc" class="text-sm md:text-base text-slate-700 dark:text-slate-300 font-medium leading-relaxed max-h-32 overflow-y-auto custom-scroll pr-3"></p>
                    <div class="mt-6 pt-5 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-[11px] uppercase font-bold tracking-wider text-slate-400">
                        <span id="popupSourceBadge" class="flex items-center gap-2"><i class="fa-brands fa-wikipedia-w"></i> Verified Wiki Info</span>
                        <a id="wikiLink" target="_blank" href="#" class="text-sky-500 hover:text-sky-400 transition flex items-center gap-1.5 p-2 -m-2 opacity-80 hover:opacity-100 font-bold uppercase tracking-wider">Explore <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ─── Constants & State ──────────────────────────────────────────
        const AI_API = '/chat';
        let map;
        let activeMarker;
        let currentTripData = null;
        let dayVisibilityMap = {};
        const tripId = new URLSearchParams(window.location.search).get('id');

        function getSessionId() {
            let sid = sessionStorage.getItem('ritu_session_id');
            if (!sid) {
                sid = 'session_' + Math.random().toString(36).slice(2) + Date.now();
                sessionStorage.setItem('ritu_session_id', sid);
            }
            return sid;
        }

        function setStatus(text, color = 'text-emerald-500') {
            const el = document.getElementById('aiStatus');
            el.textContent = text;
            el.className = `font-bold text-[11px] uppercase tracking-widest ${color}`;
        }

        // ─── Chat Logic & UI ──────────────────────────────────────────────
        function sendQuickAction(text) {
            const input = document.getElementById('chatInput');
            input.value = text;
            sendMessage();
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chatContainer');
            const isUser = role === 'user';
            
            const bubble = document.createElement('div');
            bubble.className = (isUser ? 'flex justify-end' : 'flex justify-start items-start gap-3') + ' chat-bubble-animate w-full mb-1';

            // Icon map for structured itinerary keys
            const KEY_ICONS = {
                'Morning':                  { icon: 'fa-sun',             color: '#f59e0b', label: 'Morning'                   },
                'Afternoon':                { icon: 'fa-cloud-sun',       color: '#fb923c', label: 'Afternoon'                 },
                'Evening':                  { icon: 'fa-moon',            color: '#8b5cf6', label: 'Evening'                   },
                'Date':                     { icon: 'fa-calendar-days',   color: '#0ea5e9', label: 'Date'                      },
                'Overnight Stay':           { icon: 'fa-bed',             color: '#10b981', label: 'Overnight Stay'            },
                'Estimated Travel Time':    { icon: 'fa-clock',           color: '#64748b', label: 'Est. Travel Time'          },
                'Estimated Travel Distance':{ icon: 'fa-road',            color: '#64748b', label: 'Est. Distance'             },
                'Primary Transport Method': { icon: 'fa-van-shuttle',     color: '#0ea5e9', label: 'Transport'                 },
                'Important Travel Notes':   { icon: 'fa-circle-info',     color: '#ec4899', label: 'Travel Notes'             },
            };

            // 1. Convert **Locations** to Blue Ticks
            let formatted = text.replace(/\*\*(.*?)\*\*/g, (match, p1) => {
                const safeName = p1.replace(/'/g, "\\'");
                return `<span class="blue-tick inline-flex items-center gap-1.5 bg-sky-100 dark:bg-sky-500/20 border border-sky-500/30 text-sky-600 dark:text-sky-400 px-3 py-1 rounded-lg cursor-pointer hover:bg-sky-500 hover:text-white transition-all shadow-sm font-bold mx-0.5" onclick="handleLocationClick(event, '${safeName}')">${p1} <i class="fa-solid fa-map-location-dot text-[11px] ml-0.5"></i></span>`;
            });
            
            // 2. Format ### Day Headers (Markdown H3)
            formatted = formatted.replace(/###\s*(Day\s*\d+[^\n]*)/gi, '<h4 class="text-sky-500 dark:text-sky-400 font-bold text-base mt-5 mb-2 flex items-center gap-2"><span class="inline-block w-2 h-2 bg-sky-500 rounded-full"></span>$1</h4>');
            
            // 3. Format "Day X:" bare headers without ###
            formatted = formatted.replace(/^(Day \d+:[^\n]*?)(?=\n|$)/gm, (m) => {
                if (m.includes('<h4')) return m;
                // If this line is JUST "Day N:" (no long text after it), render as a header
                if (/^Day \d+:\s*$/.test(m.trim())) {
                    return `<h4 class="text-sky-500 dark:text-sky-400 font-bold text-base mt-5 mb-2 flex items-center gap-2"><span class="inline-block w-2 h-2 bg-sky-500 rounded-full"></span>${m.trim()}</h4>`;
                }
                return m;
            });

            // 4. Render structured key-value lines as icon-badged cards
            formatted = formatted.replace(/^-\s+([\w\s]+?):\s*(.*)$/gm, (match, key, value) => {
                const trimmedKey = key.trim();
                if (KEY_ICONS[trimmedKey]) {
                    const cfg = KEY_ICONS[trimmedKey];
                    const isMeta = ['Overnight Stay','Estimated Travel Time','Estimated Travel Distance','Primary Transport Method','Important Travel Notes','Date'].includes(trimmedKey);
                    if (isMeta) {
                        return `<div class="flex items-start gap-2 py-1.5 px-3 my-1 rounded-xl" style="background:${cfg.color}18;border-left:3px solid ${cfg.color};">
                            <i class="fa-solid ${cfg.icon} text-[12px] mt-0.5 shrink-0" style="color:${cfg.color};"></i>
                            <span class="text-[12px] font-semibold" style="color:${cfg.color};">${cfg.label}:</span>
                            <span class="text-[12px] text-slate-700 dark:text-slate-300 flex-1">${value}</span>
                        </div>`;
                    } else {
                        return `<div class="mt-3 mb-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full shrink-0" style="background:${cfg.color}22;">
                                    <i class="fa-solid ${cfg.icon} text-[10px]" style="color:${cfg.color};"></i>
                                </span>
                                <span class="text-[11px] font-extrabold uppercase tracking-wider" style="color:${cfg.color};">${cfg.label}</span>
                            </div>
                            <div class="pl-8 text-[13px] text-slate-700 dark:text-slate-300 leading-relaxed">${value}</div>
                        </div>`;
                    }
                }
                // Fallback: render as arrow bullet
                return `<div class="flex items-start gap-2 py-1"><span class="text-sky-500 mt-1 shrink-0 text-[10px]">▸</span><span>${match.slice(2)}</span></div>`;
            });
            
            // 5. Format remaining plain bullet points (- or * or •)
            formatted = formatted.replace(/^[-*•]\s+(.*?)$/gm, '<div class="flex items-start gap-2 py-1"><span class="text-sky-500 mt-1 shrink-0 text-[10px]">▸</span><span>$1</span></div>');
            
            // Format numbered list items
            formatted = formatted.replace(/^(\d+)\.\s+(.*?)$/gm, '<div class="flex items-start gap-2 py-1"><span class="text-sky-500 mt-0.5 shrink-0 font-extrabold">$1.</span><span>$2</span></div>');
            
            // 6. Newlines to breaks
            formatted = formatted.replace(/\n/g, '<br>');

            let avatarHtml = '';
            if (!isUser) {
                avatarHtml = `
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-white shadow-md shrink-0 mt-1">
                        <i class="fa-solid fa-wand-magic-sparkles text-xs"></i>
                    </div>
                `;
            }

            bubble.innerHTML = `
                ${avatarHtml}
                <div class="max-w-[85%] px-5 py-4 text-[13px] md:text-sm font-medium leading-relaxed shadow-md
                    ${isUser
                    ? 'bg-gradient-to-r from-sky-500 to-indigo-600 text-white rounded-2xl rounded-tr-none ml-auto shadow-[0_4px_15px_rgba(56,189,248,0.15)]'
                    : 'bg-white/80 dark:bg-slate-800/40 backdrop-blur-md border border-slate-200/50 dark:border-white/5 text-slate-800 dark:text-slate-200 rounded-2xl rounded-tl-none'}"
                    style="word-break: break-word;">
                    ${formatted}
                </div>`;

            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }


        function showTypingIndicator() {
            const container = document.getElementById('chatMessagesContainer');
            const el = document.createElement('div');
            el.id = 'typingIndicator';
            el.className = 'flex justify-start items-start gap-3 w-full';
            el.innerHTML = `
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-white shadow-md shrink-0 mt-1">
                    <i class="fa-solid fa-wand-magic-sparkles text-xs"></i>
                </div>
                <div class="px-5 py-4 bg-white/80 dark:bg-slate-800/40 backdrop-blur-md border border-slate-200/50 dark:border-white/5 rounded-2xl rounded-tl-none shadow-md flex flex-col gap-1.5 max-w-[85%]">
                    <span class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider mb-1">Ritu is planning...</span>
                    <div class="flex gap-1.5 items-center">
                        <span class="w-2 h-2 bg-sky-400 rounded-full animate-bounce" style="animation-delay:0ms"></span>
                        <span class="w-2 h-2 bg-sky-400 rounded-full animate-bounce" style="animation-delay:150ms"></span>
                        <span class="w-2 h-2 bg-sky-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>
                    </div>
                </div>`;
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function callRitu(message) {
            const sessionId = getSessionId();
            const response = await fetch(AI_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    session_id: sessionId, 
                    message,
                    current_itinerary: currentTripData ? currentTripData.itineraryData : null,
                    tripId: tripId
                })
            });
            if (response.status === 429) {
                const errData = await response.json();
                throw new Error(errData.message || 'Rate limit exceeded');
            }
            if (!response.ok) throw new Error('AI server error');
            const data = await response.json();
            return data;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            appendMessage('user', text);
            showTypingIndicator();
            setStatus('Thinking...', 'text-yellow-400');

            try {
                const data = await callRitu(text);
                const reply = data.response;
                hideTypingIndicator();
                appendMessage('assistant', reply);
                setStatus('Online', 'text-emerald-400');

                // Sync chat history locally in currentTripData to maintain perfect state alignment
                if (currentTripData) {
                    if (!currentTripData.chatHistory) currentTripData.chatHistory = [];
                    currentTripData.chatHistory.push({ role: 'user', content: text });
                    currentTripData.chatHistory.push({ role: 'assistant', content: reply });
                }

                // 1. Plot new locations on the map in real-time
                const dest = (currentTripData ? currentTripData.destination : '') || 'India';
                plotNewLocations(reply, dest);

                // 2. Reconcile and rebuild local itinerary schedule dynamically
                if (currentTripData && currentTripData.itineraryData) {
                    let schedule = currentTripData.itineraryData.schedule || [];
                    let scheduleChanged = false;

                    const deleteMatch = text.match(/(?:delete|remove)\s+day\s+(\d+)/i);
                    if (deleteMatch) {
                        const dayToDelete = parseInt(deleteMatch[1]);
                        const originalLength = schedule.length;
                        schedule = schedule.filter(d => d.day !== dayToDelete);
                        // Shift subsequent days down
                        schedule.forEach(d => {
                            if (d.day > dayToDelete) {
                                d.day -= 1;
                            }
                        });
                        if (schedule.length !== originalLength) {
                            scheduleChanged = true;
                        }
                    } else if (data.replace_all && data.itinerary_updates && data.itinerary_updates.length > 0) {
                        // Check if reply mentions a new destination to update banner and title
                        const destMatch = reply.match(/itinerary for \*\*(.*?)\*\*/i) || reply.match(/trip to \*\*(.*?)\*\*/i);
                        if (destMatch && destMatch[1]) {
                            currentTripData.destination = destMatch[1];
                            document.getElementById('displayTitle').innerText = `Trip to ${currentTripData.destination}`;
                            updateWeatherBanner(currentTripData.destination);
                            destinationCoords = null; // Reset cache so coordinates are resolved correctly for the new destination
                        }
                        
                        schedule = data.itinerary_updates.map(update => ({
                            day: update.day,
                            activity: update.activity,
                            location: currentTripData.destination
                        }));
                        scheduleChanged = true;
                    } else if (data.itinerary_updates && data.itinerary_updates.length > 0) {
                        const scheduleMap = {};
                        schedule.forEach(d => {
                            scheduleMap[d.day] = d;
                        });

                        data.itinerary_updates.forEach(update => {
                            const existingDay = scheduleMap[update.day];
                            scheduleMap[update.day] = {
                                day: update.day,
                                activity: update.activity,
                                location: existingDay ? existingDay.location : currentTripData.destination
                            };
                        });

                        schedule = Object.keys(scheduleMap)
                            .map(k => scheduleMap[k])
                            .sort((a, b) => a.day - b.day);
                        scheduleChanged = true;
                    }

                    if (scheduleChanged) {
                        currentTripData.itineraryData.schedule = schedule;
                        currentTripData.days = schedule.length;

                        // Update header stats in real time
                        document.getElementById('displayStats').innerText = `${currentTripData.days} Days • ₹${currentTripData.budget} • ${currentTripData.vibe}`;

                        // Save back to sessionStorage for save trip feature
                        sessionStorage.setItem('tempTrip', JSON.stringify(currentTripData));

                        // Re-plot all locations and routes sequentially to keep map & transit sync'd
                        plotAllLocationsSequential(schedule, currentTripData.destination);
                    }
                }
            } catch (err) {
                hideTypingIndicator();
                if (err.message.includes('Rate limit exceeded') || err.message.includes('breath')) {
                    appendMessage('assistant', `⚠️ ${err.message}`);
                    setStatus('Rate Limited', 'text-yellow-400');
                } else {
                    appendMessage('assistant', '⚠️ Could not reach the AI Engine. Please check your FastAPI python server status.');
                    setStatus('Offline', 'text-red-400');
                }
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        // ─── Map & Blue Tick Core Engine ──────────────────────────────────────
        let activeTileLayer = null;
        function initMap() {
            map = L.map('map', { zoomControl: false, maxZoom: 18 }).setView([20.5937, 78.9629], 5);
            updateMapTileLayer(document.documentElement.getAttribute('data-theme') || 'light');
            L.control.zoom({ position: 'topright' }).addTo(map);
        }

        function updateMapTileLayer(theme) {
            if (activeTileLayer) {
                map.removeLayer(activeTileLayer);
            }
            const tileUrl = theme === 'dark' 
                ? 'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
                
            activeTileLayer = L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap contributors, &copy; CARTO'
            }).addTo(map);
        }

        // Listen for global themechanged event
        window.addEventListener('themechanged', (e) => {
            updateMapTileLayer(e.detail.theme);
        });

        async function handleLocationClick(event, placeName) {
            // Un-highlight previous ticks
            document.querySelectorAll('.blue-tick').forEach(el => {
                el.classList.remove('ring-2', 'ring-sky-500', 'bg-sky-500', 'text-white');
            });
            // Highlight current clicked tick (if clicked from chat)
            if (event && event.currentTarget && event.currentTarget.classList) {
                event.currentTarget.classList.add('ring-2', 'ring-sky-500', 'bg-sky-500', 'text-white');
            }
            
            showPopupLoading(placeName);

            try {
                // 1. Fetch Coordinates from OpenStreetMap
                const destinationStr = document.getElementById('displayTitle').innerText.replace('Trip to ', '').trim() || "India";
                const searchQuery = `${placeName}, ${destinationStr}`;
                const osmRes = await fetch(`/api/geocode?q=${encodeURIComponent(searchQuery)}`);
                const osmData = await osmRes.json();
                
                if (osmData && osmData.length > 0) {
                    const lat = parseFloat(osmData[0].lat);
                    const lon = parseFloat(osmData[0].lon);
                    
                    if (!isNaN(lat) && !isNaN(lon) && isFinite(lat) && isFinite(lon)) {
                        // Smooth zoom
                        map.flyTo([lat, lon], 15, { duration: 1.5 });
                        
                        if (activeMarker) map.removeLayer(activeMarker);
                        
                        const customIcon = L.divIcon({
                            html: `<div class="w-12 h-12 bg-sky-500 rounded-full border-4 border-white shadow-2xl flex items-center justify-center text-white text-lg animate-bounce drop-shadow-xl"><i class="fa-solid fa-location-dot"></i></div>`,
                            className: 'bg-transparent',
                            iconSize: [48, 48],
                            iconAnchor: [24, 48]
                        });
                        activeMarker = L.marker([lat, lon], {icon: customIcon}).addTo(map);
                    }
                }

                // 2. Intelligence Priority Layer
                //    First try Wikipedia for high-accuracy official data.
                //    If Wikipedia fails or lacks a thumbnail, fallback to Unsplash for generic beauty.
                
                const fallbackScenery = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=800";
                let title = placeName;
                let desc = `An incredible stop scheduled on your trip to ${destinationStr}. Ready for exploration!`;
                let imgSrc = fallbackScenery; // Stock Fallback
                let isFallback = true;
                let link = `https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(placeName)}`;
                let sourceBadge = `<span class="flex items-center gap-1.5"><i class="fa-brands fa-wikipedia-w"></i> Verified Wiki Info</span>`;

                try {
                    const wikiTitleUrl = await getWikiArticleUrl(placeName);
                    const cleanWikiTitle = decodeURIComponent(wikiTitleUrl.split("/wiki/")[1] || "").replace(/_/g, " ");
                    const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cleanWikiTitle || placeName)}`);
                    if (wikiRes.ok) {
                        const wikiData = await wikiRes.json();
                        if (wikiData.title) title = wikiData.title;
                        if (wikiData.extract && !wikiData.extract.includes("may refer to")) desc = wikiData.extract;
                        link = wikiTitleUrl;
                        
                        if (wikiData.thumbnail && wikiData.thumbnail.source) {
                            imgSrc = wikiData.thumbnail.source; // High accuracy Wikipedia image
                            isFallback = false;
                        } else {
                            // Wiki active but no image? Fetch from Unsplash secure proxy!
                            const unsplashRes = await fetch(`/api/trips/image/unsplash?query=${encodeURIComponent(placeName + " " + destinationStr)}`);
                            const unsplashData = await unsplashRes.json();
                            if (unsplashData.success && unsplashData.url) {
                                imgSrc = unsplashData.url;
                                isFallback = false;
                                sourceBadge = `<span class="flex items-center gap-1.5"><i class="fa-solid fa-camera"></i> Unsplash Imagery</span>`;
                            }
                        }
                    } else {
                        throw new Error("Wikipedia API 404");
                    }
                } catch(wikiErr) {
                    console.log("Wikipedia failed, relying entirely on Unsplash...");
                    const wikiTitleUrl = await getWikiArticleUrl(placeName);
                    link = wikiTitleUrl;
                    // Wikipedia totally failed (maybe niche cafe/restaurant). Use Unsplash + Default Desc.
                    const unsplashRes = await fetch(`/api/trips/image/unsplash?query=${encodeURIComponent(placeName + " " + destinationStr)}`);
                    const unsplashData = await unsplashRes.json();
                    if (unsplashData.success && unsplashData.url) {
                        imgSrc = unsplashData.url;
                        isFallback = false;
                        sourceBadge = `<span class="flex items-center gap-1.5 text-slate-500"><i class="fa-solid fa-camera"></i> Local Capture via Unsplash</span>`;
                    }
                }
                
                showPopupDetails(title, desc, imgSrc, link, sourceBadge, isFallback);

                // Find the corresponding marker and show MapCN-style custom popup
                let targetMarker = null;
                routeLayerGroup.eachLayer(layer => {
                    if (layer instanceof L.Marker && layer.placeName && layer.placeName.toLowerCase() === placeName.toLowerCase()) {
                        targetMarker = layer;
                    }
                });

                if (targetMarker) {
                    let weatherInfoHtml = '';
                    try {
                        const weatherRes = await fetch(`/api/weather?lat=${lat}&lon=${lon}&destination=${encodeURIComponent(placeName)}`);
                        if (weatherRes.ok) {
                            const weatherData = await weatherRes.json();
                            if (weatherData.current) {
                                weatherInfoHtml = `
                                    <div class="mt-2 flex items-center justify-between text-[10px] font-semibold border-t border-slate-100 dark:border-white/5 pt-2">
                                        <span class="text-slate-400">Current Weather:</span>
                                        <span class="flex items-center gap-1 text-slate-700 dark:text-slate-300">
                                            <span>${weatherData.current.icon || '🌤️'}</span>
                                            <span>${weatherData.current.temp}°C</span>
                                            <span class="text-[9px] text-slate-400">(${weatherData.current.label})</span>
                                        </span>
                                    </div>
                                `;
                            }
                        }
                    } catch(weatherErr) {
                        console.warn("Could not get weather for marker popup:", weatherErr);
                    }

                    const popupContent = `
                        <div class="p-3 text-slate-800 dark:text-white font-medium" style="min-width:240px; max-width:260px; font-family:'Plus Jakarta Sans', sans-serif;">
                            <div class="w-full h-24 bg-slate-200 dark:bg-slate-800 rounded-lg overflow-hidden relative mb-2.5">
                                <img src="${imgSrc}" class="w-full h-full object-cover" onerror="this.style.display='none';">
                            </div>
                            <span class="inline-block text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded bg-sky-500/10 text-sky-500 mb-1">
                                Day ${targetMarker.dayNum || '•'} Stop #${targetMarker.stopIndex || '1'}
                            </span>
                            <h4 class="font-black text-xs mb-1 line-clamp-2">${title}</h4>
                            <p class="text-[9px] text-slate-500 dark:text-slate-400 leading-tight line-clamp-3 mb-2">${desc}</p>
                            ${weatherInfoHtml}
                            <div class="flex items-center justify-between gap-3 pt-2 mt-2 border-t border-slate-100 dark:border-slate-800">
                                <a target="_blank" href="${link}" class="text-sky-500 hover:text-sky-400 text-[9px] font-black uppercase tracking-wider flex items-center gap-1">Explore Wiki <i class="fa-solid fa-arrow-up-right-from-square text-[8px]"></i></a>
                            </div>
                        </div>
                    `;
                    targetMarker.bindPopup(popupContent, {
                        className: 'leaflet-custom-popup-modern',
                        offset: [0, -32]
                    }).openPopup();
                }

            } catch(e) {
                console.error("Map query pipeline failed universally", e);
                const searchLink = `https://en.wikipedia.org/w/index.php?search=${encodeURIComponent(placeName)}`;
                showPopupDetails(placeName, "A beautiful spot scheduled on your itinerary.", fallbackScenery, searchLink, `<i class="fa-solid fa-eye-slash"></i> Image Unavailable`, true);
                
                let targetMarker = null;
                routeLayerGroup.eachLayer(layer => {
                    if (layer instanceof L.Marker && layer.placeName && layer.placeName.toLowerCase() === placeName.toLowerCase()) {
                        targetMarker = layer;
                    }
                });
                if (targetMarker) {
                    const popupContent = `
                        <div class="p-3 text-slate-800 dark:text-white font-medium" style="min-width:200px; font-family:'Plus Jakarta Sans', sans-serif;">
                            <span class="inline-block text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded bg-sky-500/10 text-sky-500 mb-1">
                                Day ${targetMarker.dayNum || '•'} Stop #${targetMarker.stopIndex || '1'}
                            </span>
                            <h4 class="font-black text-xs mb-1">${placeName}</h4>
                            <p class="text-[9px] text-slate-500 dark:text-slate-400 leading-tight mb-2">Scheduled stop on your itinerary.</p>
                            <div class="flex items-center justify-between gap-3 pt-2 border-t border-slate-100 dark:border-slate-800">
                                <a target="_blank" href="${searchLink}" class="text-sky-500 hover:text-sky-400 text-[9px] font-black uppercase tracking-wider flex items-center gap-1">Explore Wiki <i class="fa-solid fa-arrow-up-right-from-square text-[8px]"></i></a>
                            </div>
                        </div>
                    `;
                    targetMarker.bindPopup(popupContent, {
                        className: 'leaflet-custom-popup-modern',
                        offset: [0, -32]
                    }).openPopup();
                }
            }
        }
