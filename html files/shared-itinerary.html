<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View a shared JourneyAI travel itinerary — explore day-by-day plans, destinations, and budget breakdowns.">
    <title>Journey AI - Shared Itinerary</title>
    <link rel="stylesheet" href="assets/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --bg: #F8FAFC;
            --text: #0F172A;
            --glass: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.5);
        }

        [data-theme='dark'] {
            --bg: #0F172A;
            --text: #F8FAFC;
            --glass: rgba(15, 23, 42, 0.5);
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: "Plus Jakarta Sans", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .iphone-glass {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            transition: background 0.4s ease, border 0.4s ease;
        }

        [data-theme='dark'] .iphone-glass {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Dynamic background canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Timeline Animations */
        @keyframes drawLine {
            from { height: 0; }
            to { height: 100%; }
        }

        @keyframes lineGlow {
            0%, 100% {
                box-shadow: 0 0 8px rgba(56, 189, 248, 0.4), 0 0 15px rgba(56, 189, 248, 0.2);
                border-color: rgba(56, 189, 248, 0.8);
            }
            50% {
                box-shadow: 0 0 16px rgba(56, 189, 248, 0.7), 0 0 25px rgba(56, 189, 248, 0.4);
                border-color: rgba(56, 189, 248, 1);
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 12px rgba(56, 189, 248, 0.5), 0 0 20px rgba(56, 189, 248, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 20px rgba(56, 189, 248, 0.85), 0 0 32px rgba(56, 189, 248, 0.5);
                transform: scale(1.08);
            }
        }

        .timeline-line {
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            background: linear-gradient(to bottom, #38BDF8 0%, #0EA5E9 50%, rgba(56, 189, 248, 0.1) 100%);
            height: 100%;
            transform-origin: top;
            animation: drawLine 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .timeline-glow-dot {
            animation: glowPulse 2.5s infinite ease-in-out;
        }

        .timeline-node {
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.6s cubic-bezier(0.3, 0.8, 0.2, 1);
        }

        .timeline-node.visible {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>

<body class="flex flex-col relative w-full">
    <canvas id="bg-canvas"></canvas>
    
    <nav></nav>
 
     <!-- Main Content -->
     <main class="flex-1 w-full max-w-[1000px] mx-auto px-4 md:px-8 pb-20 pt-6 relative z-10">
         
         <!-- Header Section -->
         <header id="tripHeader" class="iphone-glass rounded-[32px] p-8 md:p-12 text-center mb-12 shadow-2xl relative overflow-hidden hidden">
             <!-- Glow effect behind text -->
             <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-sky-500/10 blur-[80px] pointer-events-none rounded-full"></div>
             
             <div class="relative z-10">
                 <span id="tripVibe" class="inline-block px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sky-500 dark:text-sky-400 text-[10px] uppercase font-black tracking-widest mb-4">Loading...</span>
                 <h1 id="tripTitle" class="text-4xl md:text-6xl font-black tracking-tight mb-4 leading-tight">Shared Trip</h1>
                 <p id="tripStats" class="text-lg md:text-xl text-slate-500 dark:text-slate-400 font-medium">-- Days • ₹-- • Flowchart View</p>
             </div>
         </header>
 
         <!-- Loading Spinner -->
         <div id="loading" class="flex flex-col items-center justify-center py-20">
             <i class="fa-solid fa-circle-notch fa-spin text-4xl text-sky-500 mb-4"></i>
             <p class="text-slate-400 font-medium tracking-wide">Fetching itinerary...</p>
         </div>
 
         <!-- Flowchart / Timeline Container -->
         <div id="flowchartContainer" class="relative ml-2 md:ml-8 hidden max-w-3xl mx-auto">
             <!-- Line injected dynamically -->
             <div class="timeline-line"></div>
             
             <div id="nodesContainer" class="space-y-12">
                 <!-- Nodes dynamically injected here -->
             </div>
             
             <!-- Endpoint circle -->
             <div class="relative pl-10 md:pl-16 mt-12 timeline-node delay-[800ms]">
                 <div class="absolute -left-[14px] top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-[var(--bg)] border-2 border-sky-400 flex items-center justify-center z-10 text-sky-400 shadow-[0_0_20px_rgba(56,189,248,0.4)]">
                     <i class="fa-solid fa-flag-checkered text-[10px]"></i>
                 </div>
             </div>
         </div>
 
         <!-- Error State -->
         <div id="errorState" class="hidden flex flex-col items-center justify-center py-20 text-center">
             <div class="w-16 h-16 bg-rose-500/10 rounded-full flex items-center justify-center mb-4">
                 <i class="fa-solid fa-triangle-exclamation text-2xl text-rose-500"></i>
             </div>
             <h2 class="text-2xl font-black mb-2">Itinerary Not Found</h2>
             <p class="text-slate-500 dark:text-slate-400 mb-6 max-w-sm">This trip either doesn't exist, was deleted, or the link is broken.</p>
             <a href="index.html" class="bg-slate-200 dark:bg-white/10 hover:bg-slate-300 dark:hover:bg-white/20 text-slate-800 dark:text-white px-6 py-3 rounded-xl font-bold transition">Return Home</a>
         </div>
     </main>
 
     <script src="dynamic-bg.js"></script>
     <script src="navbar.js"></script>
     <script>
         async function fetchSharedTrip() {
             const urlParams = new URLSearchParams(window.location.search);
             const id = urlParams.get('id');
 
             if (!id) {
                 showError();
                 return;
             }
 
             try {
                 // Fetch from the new public route
                 const response = await fetch(`/api/trips/shared/${id}`);
                 const data = await response.json();
 
                 if (data.success && data.data && data.data.itineraryData) {
                     renderFlowchart(data.data);
                 } else {
                     showError();
                 }
             } catch (err) {
                 console.error("Failed to fetch shared trip:", err);
                 showError();
             }
          }

        function formatActivity(text) {
              if (!text) return '';

              // Key-icon config for structured itinerary rows
              const KEY_ICONS = {
                  'Morning':                   { icon: 'fa-sun',           color: '#f59e0b' },
                  'Afternoon':                 { icon: 'fa-cloud-sun',     color: '#fb923c' },
                  'Evening':                   { icon: 'fa-moon',          color: '#8b5cf6' },
                  'Date':                      { icon: 'fa-calendar-days', color: '#0ea5e9' },
                  'Overnight Stay':            { icon: 'fa-bed',           color: '#10b981' },
                  'Estimated Travel Time':     { icon: 'fa-clock',         color: '#64748b' },
                  'Estimated Travel Distance': { icon: 'fa-road',          color: '#64748b' },
                  'Primary Transport Method':  { icon: 'fa-van-shuttle',   color: '#0ea5e9' },
                  'Important Travel Notes':    { icon: 'fa-circle-info',   color: '#ec4899' },
              };
              const META_KEYS = ['Overnight Stay','Estimated Travel Time','Estimated Travel Distance','Primary Transport Method','Important Travel Notes','Date'];
              const CONTENT_KEYS = ['Morning','Afternoon','Evening'];

              // Convert **bold** to styled spans
              let formatted = text.replace(/\*\*(.*?)\*\*/g, '<span class="text-sky-500 dark:text-sky-300 font-bold">$1</span>');

              const lines = formatted.split('\n').filter(l => l.trim());
              const isStructured = lines.some(l => {
                  const m = l.trim().match(/^-\s+([\w\s]+?):\s*/);
                  return m && KEY_ICONS[m[1].trim()];
              });

              if (isStructured) {
                  const parts = [];
                  for (const line of lines) {
                      const trimmed = line.trim();
                      const kvMatch = trimmed.match(/^-\s+([\w\s]+?):\s*(.*)/);
                      if (kvMatch) {
                          const key = kvMatch[1].trim();
                          const val = kvMatch[2];
                          if (KEY_ICONS[key]) {
                              const cfg = KEY_ICONS[key];
                              if (CONTENT_KEYS.includes(key)) {
                                  parts.push(`
                                      <div class="mb-3">
                                          <div class="flex items-center gap-2 mb-1">
                                              <span class="inline-flex items-center justify-center w-6 h-6 rounded-full shrink-0" style="background:${cfg.color}22;">
                                                  <i class="fa-solid ${cfg.icon} text-[10px]" style="color:${cfg.color};"></i>
                                              </span>
                                              <span class="text-[10px] font-black uppercase tracking-widest" style="color:${cfg.color};">${key}</span>
                                          </div>
                                          <div class="pl-8 text-[13px] text-slate-700 dark:text-slate-300 leading-relaxed">${val}</div>
                                      </div>`);
                              } else if (META_KEYS.includes(key)) {
                                  parts.push(`
                                      <div class="flex items-start gap-2 py-1 px-2 my-0.5 rounded-lg" style="background:${cfg.color}12;border-left:2px solid ${cfg.color}80;">
                                          <i class="fa-solid ${cfg.icon} text-[11px] mt-0.5 shrink-0" style="color:${cfg.color};"></i>
                                          <span class="text-[11px] font-semibold shrink-0" style="color:${cfg.color};">${key}:</span>
                                          <span class="text-[11px] text-slate-600 dark:text-slate-400 flex-1">${val}</span>
                                      </div>`);
                              }
                          }
                          continue;
                      }
                      // Fallback non-kv lines
                      const bulletMatch = trimmed.match(/^[-•*]\s+(.*)/);
                      if (bulletMatch) {
                          parts.push(`<li class="flex items-start gap-2"><span class="text-sky-400 mt-1.5 shrink-0 text-[8px]">▸</span><span>${bulletMatch[1]}</span></li>`);
                          continue;
                      }
                      if (trimmed) parts.push(`<div class="text-[12px] text-slate-500 dark:text-slate-400">${trimmed}</div>`);
                  }
                  return `<div class="space-y-1">${parts.join('')}</div>`;
              }

              // Legacy plain-text bullet rendering
              const hasListItems = lines.some(l => l.trim().match(/^[-•*]\s/) || l.trim().match(/^\d+\.\s/));
              if (hasListItems) {
                  const items = lines.map(line => {
                      const trimmed = line.trim();
                      const bulletMatch = trimmed.match(/^[-•*]\s+(.*)/);
                      if (bulletMatch) {
                          return `<li class="flex items-start gap-2"><span class="text-sky-400 mt-1.5 shrink-0 text-[8px]">▸</span><span>${bulletMatch[1]}</span></li>`;
                      }
                      const numberMatch = trimmed.match(/^(\d+)\.\s+(.*)/);
                      if (numberMatch) {
                          return `<li class="flex items-start gap-2"><span class="text-sky-400 mt-0.5 shrink-0 font-extrabold">${numberMatch[1]}.</span><span>${numberMatch[2]}</span></li>`;
                      }
                      return `<li class="flex items-start gap-2"><span>${trimmed}</span></li>`;
                  }).filter(Boolean).join('');
                  return `<ul class="space-y-2 list-none">${items}</ul>`;
              }
              // Otherwise join as paragraph with line breaks
              return lines.join('<br>');
          }

          function renderFlowchart(trip) {
              document.getElementById('loading').classList.add('hidden');
              
              // Render Header
              const header = document.getElementById('tripHeader');
              header.classList.remove('hidden');
              document.getElementById('tripTitle').innerText = `Trip to ${trip.destination}`;
              document.getElementById('tripStats').innerText = `${trip.days} Days • ₹${Number(trip.budget).toLocaleString('en-IN')} • Guided Flowchart`;
              document.getElementById('tripVibe').innerHTML = `<i class="fa-solid fa-leaf mr-1"></i> ${trip.vibe || 'Adventure'}`;

              // Render Nodes
              const container = document.getElementById('flowchartContainer');
              const nodesContainer = document.getElementById('nodesContainer');
              container.classList.remove('hidden');

              const schedule = trip.itineraryData.schedule || [];
              
              let html = '';
              schedule.forEach((day, index) => {
                  const formattedActivity = formatActivity(day.activity);
                  
                  html += `
                  <div class="relative pl-10 md:pl-16 timeline-node" style="transition-delay: ${index * 150}ms">
                      <!-- Connector Dot -->
                      <div class="absolute -left-[14px] top-6 w-7 h-7 bg-sky-500 rounded-full border-4 border-[var(--bg)] shadow-[0_0_20px_rgba(56,189,248,0.6)] flex items-center justify-center z-10 group-hover:scale-110 transition shrink-0 timeline-glow-dot">
                          <div class="w-2 h-2 bg-white rounded-full"></div>
                      </div>
                      
                      <!-- Content Card -->
                      <div class="iphone-glass p-6 md:p-8 rounded-[24px] border border-sky-400/20 hover:border-sky-400/50 transition duration-300 group hover:-translate-y-1 hover:shadow-[0_15px_40px_-15px_rgba(56,189,248,0.3)]">
                          <span class="inline-block px-3 py-1 rounded-full bg-sky-500/10 text-sky-500 dark:text-sky-400 font-black text-[10px] uppercase tracking-widest mb-3 border border-sky-500/20">
                              Day ${day.day}
                          </span>
                          <h3 class="text-slate-900 dark:text-white font-black text-xl md:text-2xl mb-3 leading-tight tracking-tight">${day.location || trip.destination}</h3>
                          <div class="text-slate-600 dark:text-slate-300 text-sm md:text-base leading-relaxed font-medium">${formattedActivity}</div>
                      </div>
                  </div>
                  `;
              });

              nodesContainer.innerHTML = html;

            // Trigger animations
            setTimeout(() => {
                document.querySelectorAll('.timeline-node').forEach(node => {
                    node.classList.add('visible');
                });
            }, 100);
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchSharedTrip);
    </script>
</body>

</html>
